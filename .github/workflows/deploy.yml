name: Deploy to VPS

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            set -e

            cd /var/www/power-pro-distributor

            echo "Pull latest code"
            git fetch origin
            git reset --hard origin/develop

            echo "Install server dependencies"
            cd /var/www/power-pro-distributor/server
            npm install

            echo "Install client dependencies"
            cd /var/www/power-pro-distributor/client
            npm install

            echo "Build client"
            npm run build

            echo "Restart PM2 processes"
            cd /var/www/power-pro-distributor
            pm2 start ecosystem.config.js --update-env || true
            pm2 reload ecosystem.config.js --update-env
            pm2 save
