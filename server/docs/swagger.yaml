openapi: 3.0.3
info:
  title: FitWin Shop API
  version: 1.0.5
  description: >
    API для CRUD товаров, отправки заявок (leads) в Telegram и работы с заказами (orders).
    В БД заявка (lead) сохраняет только: name, phone, promoCode.
servers:
  - url: /api

tags:
  - name: Products
    description: CRUD товаров
  - name: Leads
    description: >
      Заявки (отправка в Telegram). В БД сохраняются только name/phone/promoCode.
      В сообщение можно передавать товары и/или кастомные боксы. Можно и без товаров.
  - name: Orders
    description: CRUD замовлень

paths:
  /products:
    get:
      tags: [Products]
      summary: Список товаров
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - in: query
          name: q
          schema: { type: string }
          description: Текстовый поиск ($text) по title.* (ua/ru/en/sk)
        - in: query
          name: isActive
          schema: { type: boolean }
        - in: query
          name: inStock
          schema: { type: boolean }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"

    post:
      tags: [Products]
      summary: Создать товар
      description: Обычно должен быть защищён админ-авторизацией.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProductCreate" }
            example:
              slug: "fitwin-pistachio-cream-60g"
              title: { sk: "PISTÁCIA A KRÉM", ua: "", ru: "", en: "" }
              subtitle:
                {
                  sk: "FitWin tyčinka s náplňou. 60 g.",
                  ua: "",
                  ru: "",
                  en: "",
                }
              description:
                {
                  sk: "<p>Krémová pistáciová tyčinka.</p>",
                  ua: "",
                  ru: "",
                  en: "",
                }
              ingredients: { sk: "Zloženie: ...", ua: "", ru: "", en: "" }
              features:
                sk:
                  - "20 g bielkovín v každej tyčinke"
                  - "Bez pridaného cukru"
                ua: []
                ru: []
                en: []
              cover:
                url: "https://cdn.site/fitwin/pistachio.jpg"
                alt: { sk: "FitWin Pistácia a krém", ua: "", ru: "", en: "" }
                sort: 0
              gallery:
                - url: "https://cdn.site/fitwin/pistachio-2.jpg"
                  alt: { sk: "Balenie produktu", ua: "", ru: "", en: "" }
                  sort: 1
              cardBadges:
                - key: "protein_percent"
                  valueNumber: 33
                  unit: "%"
                  display: "value"
                  sort: 1
                  isHighlighted: true
                - key: "kcal"
                  valueNumber: 218
                  unit: "kcal"
                  display: "value"
                  sort: 2
                - key: "weight"
                  valueNumber: 60
                  unit: "g"
                  display: "value"
                  sort: 3
              nutritionTable:
                title: { sk: "Výživové údaje", ua: "", ru: "", en: "" }
                columns:
                  - key: "per_100g"
                    label: { sk: "NA 100 G", ua: "", ru: "", en: "" }
                    meta: { grams: 100 }
                    sort: 1
                  - key: "per_60g"
                    label: { sk: "NA 60 G", ua: "", ru: "", en: "" }
                    meta: { grams: 60 }
                    sort: 2
                rows:
                  - key: "energy"
                    label: { sk: "Energia", ua: "", ru: "", en: "" }
                    sort: 1
                    values:
                      per_100g: { text: "1436 kJ / 364 kcal", unit: "" }
                      per_60g: { text: "862 kJ / 218 kcal", unit: "" }
                  - key: "protein"
                    label: { sk: "Bielkoviny", ua: "", ru: "", en: "" }
                    sort: 10
                    values:
                      per_100g: { value: 33, unit: "g" }
                      per_60g: { value: 20, unit: "g" }
              currency: "EUR"
              price: 2.49
              oldPrice: 2.99
              inStock: true
              weightG: 60
              proteinG: 20
              seoTitle: { sk: "FitWin Pistácia a krém", ua: "", ru: "", en: "" }
              seoDescription:
                { sk: "Proteínová tyčinka 60 g.", ua: "", ru: "", en: "" }
              isActive: true
              sort: 10
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Product" }

  /products/{idOrSlug}:
    get:
      tags: [Products]
      summary: Получить товар по id или slug
      parameters:
        - in: path
          name: idOrSlug
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Product" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /products/{id}:
    put:
      tags: [Products]
      summary: Обновить товар по id
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProductUpdate" }
            example:
              price: 2.49
              oldPrice: 2.99
              inStock: true
              cardBadges:
                - key: "protein_percent"
                  valueNumber: 33
                  unit: "%"
                  sort: 1
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Product" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

    delete:
      tags: [Products]
      summary: Удалить товар по id
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkResponse" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /leads/send:
    post:
      tags: [Leads]
      summary: Отправить lead в Telegram (товары и/или кастомные боксы). Можно без товаров.
      description: |
        **Важно:** в БД сохраняются только `name`, `phone`, `promoCode`.
        Поле `items` используется только для формирования сообщения в Telegram.

        ## items может быть пустым или отсутствовать
        Можно отправить заявку без товаров:
        ```json
        { "name":"Andrej", "phone":"+421900000000", "promoCode":"" }
        ```

        ## Как формировать кастомный бокс (custom_box)
        В массив `items` можно добавить объект:
        ```json
        {
          "kind": "custom_box",
          "size": 5,
          "items": [
            { "productId": "PRODUCT_ID_1", "qty": 2 },
            { "productId": "PRODUCT_ID_2", "qty": 3 }
          ]
        }
        ```

        ### Правила:
        - `kind` = `"custom_box"`
        - `size` ∈ **{5, 10}**
        - `items[]` — массив выбранных товаров
        - каждый элемент `items[]` должен иметь:
          - `productId` **или** `_id` **или** `id`
          - `qty` **или** `quantity` (число > 0)
        - **сумма всех qty/quantity должна быть ровно равна `size`**
          - иначе сервер вернёт `box_invalid_total_qty`

        ### Что делает сервер:
        - подтягивает товары из Mongo по id
        - считает стоимость по цене товара (`cost` или `price`) * qty
        - применяет скидку товара (`discount`) если есть (если в схеме присутствует)
        - формирует позицию `custom_box` и отправляет в Telegram

        Ошибки:
        - `box_invalid_size`, `box_empty`, `box_invalid_total_qty`, `box_product_not_found`
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LeadSendRequest" }
            examples:
              lead_without_items:
                summary: Lead — без товаров (только имя/телефон/промокод)
                value:
                  name: "Andrej"
                  phone: "+421900000000"
                  promoCode: ""
              lead_only_products:
                summary: Lead — только товары
                value:
                  name: "Ivan"
                  phone: "+421901234567"
                  promoCode: "SALE10"
                  items:
                    - kind: "product"
                      productId: "65f0aaaaaaaaaaaaaaaaaaaaaaa1"
                      quantity: 2
                    - kind: "product"
                      _id: "65f0aaaaaaaaaaaaaaaaaaaaaaa2"
                      qty: 1
              lead_only_custom_box_5:
                summary: Lead — только custom_box (size=5, сумма qty=5)
                value:
                  name: "Marek"
                  phone: "+421900000000"
                  promoCode: ""
                  items:
                    - kind: "custom_box"
                      size: 5
                      items:
                        - productId: "65f0aaaaaaaaaaaaaaaaaaaaaaa1"
                          qty: 2
                        - productId: "65f0aaaaaaaaaaaaaaaaaaaaaaa2"
                          qty: 3
              lead_custom_box_10_plus_product:
                summary: Lead — custom_box (10) + отдельный товар
                value:
                  name: "Oksana"
                  phone: "+380501112233"
                  promoCode: "FIT5"
                  items:
                    - kind: "custom_box"
                      size: 10
                      items:
                        - _id: "65f0aaaaaaaaaaaaaaaaaaaaaaa1"
                          quantity: 4
                        - _id: "65f0aaaaaaaaaaaaaaaaaaaaaaa2"
                          quantity: 6
                    - kind: "product"
                      productId: "65f0aaaaaaaaaaaaaaaaaaaaaaa3"
                      quantity: 1
              lead_invalid_custom_box_total:
                summary: ❌ Ошибка — сумма qty не равна size
                value:
                  name: "Test"
                  phone: "+421900111222"
                  promoCode: "X"
                  items:
                    - kind: "custom_box"
                      size: 10
                      items:
                        - productId: "65f0aaaaaaaaaaaaaaaaaaaaaaa1"
                          qty: 3
                        - productId: "65f0aaaaaaaaaaaaaaaaaaaaaaa2"
                          qty: 3
      responses:
        "201":
          description: OK (sent to Telegram)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  leadId:
                    { type: string, example: "65f0bbbbbbbbbbbbbbbbbbbbbbb" }
                  totalCost: { type: number, example: 0 }
                  itemsCount: { type: integer, example: 0 }
        "400":
          description: Bad request (validation / wrong box / wrong items)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "500":
          description: Failed to send lead
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /orders:
    post:
      tags: [Orders]
      summary: Створити замовлення
      description: |
        Створює нове замовлення.

        Підтримуються позиції:
        - `kind=product`
        - `kind=custom_box`

        Для `custom_box` діють ті самі правила, що і для lead:
        - `size` тільки `5` або `10`
        - сума `qty/quantity` всередині боксу має дорівнювати `size`

        Якщо `orderNumber` не передано, він генерується автоматично на бекенді.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderCreateRequest"
            examples:
              order_only_products:
                summary: Замовлення тільки з товарами
                value:
                  name: "Andrej"
                  surname: "Novak"
                  phone: "+421900000000"
                  email: "andrej@example.com"
                  promoCode: "SALE10"
                  items:
                    - kind: "product"
                      productId: "65f0aaaaaaaaaaaaaaaaaaaaaaa1"
                      quantity: 2
                    - kind: "product"
                      _id: "65f0aaaaaaaaaaaaaaaaaaaaaaa2"
                      qty: 1
                  delivery:
                    country: "Slovakia"
                    method: "courier"
                    city: "Bratislava"
                    address: "Test street 1"
                    note: "Call before delivery"
                    psc: "811 01"
                  payment:
                    method: "online"
                    status: "pending"
                  comment: "Please deliver tomorrow"
                  status: "new"
              order_custom_box_and_product:
                summary: Замовлення з custom_box і окремим товаром
                value:
                  name: "Oksana"
                  phone: "+380501112233"
                  email: "oksana@example.com"
                  promoCode: "FIT5"
                  items:
                    - kind: "custom_box"
                      size: 10
                      items:
                        - _id: "65f0aaaaaaaaaaaaaaaaaaaaaaa1"
                          quantity: 4
                        - _id: "65f0aaaaaaaaaaaaaaaaaaaaaaa2"
                          quantity: 6
                    - kind: "product"
                      productId: "65f0aaaaaaaaaaaaaaaaaaaaaaa3"
                      quantity: 1
                  delivery:
                    method: "nova_poshta"
                    city: "Київ"
                    warehouse: "Відділення №12"
                  payment:
                    method: "card"
                    status: "pending"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  order:
                    $ref: "#/components/schemas/Order"
        "400":
          description: Bad request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "500":
          description: Failed to create order
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

    get:
      tags: [Orders]
      summary: Отримати список замовлень
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - in: query
          name: status
          schema:
            type: string
            enum: [new, processing, confirmed, shipped, completed, cancelled]
        - in: query
          name: phone
          schema: { type: string }
          description: Пошук по customer.phone через regex
        - in: query
          name: q
          schema: { type: string }
          description: Пошук по orderNumber, customer.name, customer.phone, promoCode
        - in: query
          name: sort
          schema: { type: string, default: "-createdAt" }
          description: Сортування для Mongoose, наприклад `-createdAt` або `createdAt`
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"
        "500":
          description: Failed to get orders
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /orders/{id}:
    get:
      tags: [Orders]
      summary: Отримати замовлення по id
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  data:
                    $ref: "#/components/schemas/Order"
        "404":
          description: Order not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "500":
          description: Failed to get order
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

    put:
      tags: [Orders]
      summary: Оновити замовлення
      description: |
        Оновлює замовлення по id.

        Якщо передати `items`, вони повністю перебудовуються через `buildOrderPositions()`,
        а `totals` перераховуються автоматично.

        Якщо `items` не передавати, оновляться тільки інші поля.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderUpdateRequest"
            examples:
              update_status_comment:
                summary: Оновити статус і коментар
                value:
                  status: "processing"
                  comment: "Customer confirmed by phone"
              update_items_delivery_payment:
                summary: Оновити товари, доставку та оплату
                value:
                  items:
                    - kind: "product"
                      productId: "65f0aaaaaaaaaaaaaaaaaaaaaaa1"
                      quantity: 3
                    - kind: "custom_box"
                      size: 5
                      items:
                        - productId: "65f0aaaaaaaaaaaaaaaaaaaaaaa2"
                          qty: 2
                        - productId: "65f0aaaaaaaaaaaaaaaaaaaaaaa3"
                          qty: 3
                  delivery:
                    method: "courier"
                    city: "Brno"
                    address: "New address 25"
                  payment:
                    method: "bank_transfer"
                    status: "pending"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  data:
                    $ref: "#/components/schemas/Order"
        "400":
          description: Bad request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Order not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "500":
          description: Failed to update order
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

    delete:
      tags: [Orders]
      summary: Видалити замовлення
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  message: { type: string, example: "Замовлення видалено" }
        "404":
          description: Order not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "500":
          description: Failed to delete order
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /orders/{id}/status:
    patch:
      tags: [Orders]
      summary: Оновити статус замовлення
      description: |
        Часткове оновлення статусів замовлення.

        Можна передати:
        - `status` — статус замовлення
        - `paymentStatus` — статус оплати
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusPatchRequest"
            examples:
              update_order_status:
                summary: Оновити тільки статус замовлення
                value:
                  status: "confirmed"
              update_payment_status:
                summary: Оновити тільки статус оплати
                value:
                  paymentStatus: "paid"
              update_both:
                summary: Оновити обидва статуси
                value:
                  status: "completed"
                  paymentStatus: "paid"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  data:
                    $ref: "#/components/schemas/Order"
        "404":
          description: Order not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "500":
          description: Failed to update order status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

components:
  schemas:
    OkResponse:
      type: object
      properties:
        ok: { type: boolean, example: true }

    ErrorResponse:
      type: object
      properties:
        message: { type: string, example: "Bad request" }
        error: { type: string, example: "box_invalid_total_qty" }

    ObjectId:
      type: string
      example: "65f0aaaaaaaaaaaaaaaaaaaaaaa1"

    LocalizedString:
      type: object
      properties:
        ua: { type: string, default: "" }
        ru: { type: string, default: "" }
        en: { type: string, default: "" }
        sk: { type: string, default: "" }

    LocalizedStringArray:
      type: object
      properties:
        ua:
          type: array
          items: { type: string }
          default: []
        ru:
          type: array
          items: { type: string }
          default: []
        en:
          type: array
          items: { type: string }
          default: []
        sk:
          type: array
          items: { type: string }
          default: []

    Image:
      type: object
      properties:
        url: { type: string, example: "https://cdn.site/img.jpg" }
        alt: { $ref: "#/components/schemas/LocalizedString" }
        sort: { type: integer, example: 0 }
      required: [url]

    Badge:
      type: object
      properties:
        key:
          type: string
          example: "protein_percent"
          description: "Технический ключ бейджа (например protein_percent, kcal, sugar, weight)"
        label:
          $ref: "#/components/schemas/LocalizedString"
          description: "Необязательно. Если display=label_value — будет использоваться."
        valueNumber:
          type: number
          nullable: true
          example: 33
        valueText:
          type: string
          example: ""
          description: "Если нужно отдать строкой (например '1436 kJ / 364 kcal')"
        unit:
          type: string
          example: "%"
        display:
          type: string
          enum: [value, label_value]
          default: value
        sort:
          type: integer
          default: 0
        isHighlighted:
          type: boolean
          default: false
      required: [key]

    NutritionCell:
      type: object
      properties:
        value:
          type: number
          nullable: true
          example: 33
        text:
          type: string
          example: "1436 kJ / 364 kcal"
        unit:
          type: string
          example: "g"

    NutritionColumnMeta:
      type: object
      properties:
        grams:
          type: number
          nullable: true
          example: 100

    NutritionColumn:
      type: object
      properties:
        key:
          type: string
          example: "per_100g"
        label:
          $ref: "#/components/schemas/LocalizedString"
        meta:
          $ref: "#/components/schemas/NutritionColumnMeta"
        sort:
          type: integer
          default: 0
      required: [key]

    NutritionRow:
      type: object
      properties:
        key:
          type: string
          example: "protein"
        label:
          $ref: "#/components/schemas/LocalizedString"
        values:
          type: object
          description: >
            Map<columnKey, NutritionCell>.
            Ключи должны соответствовать NutritionTable.columns[].key
          additionalProperties:
            $ref: "#/components/schemas/NutritionCell"
          example:
            per_100g: { value: 33, unit: "g" }
            per_60g: { value: 20, unit: "g" }
        sort:
          type: integer
          default: 0
      required: [key]

    NutritionTable:
      type: object
      properties:
        title:
          $ref: "#/components/schemas/LocalizedString"
        columns:
          type: array
          items: { $ref: "#/components/schemas/NutritionColumn" }
          default: []
        rows:
          type: array
          items: { $ref: "#/components/schemas/NutritionRow" }
          default: []

    Product:
      type: object
      properties:
        _id: { $ref: "#/components/schemas/ObjectId" }

        slug: { type: string, example: "fitwin-pistachio-cream-60g" }

        title: { $ref: "#/components/schemas/LocalizedString" }
        subtitle: { $ref: "#/components/schemas/LocalizedString" }
        description:
          $ref: "#/components/schemas/LocalizedString"
          description: "Можно HTML"
        ingredients:
          $ref: "#/components/schemas/LocalizedString"
          description: "Состав (Zloženie)"
        features:
          $ref: "#/components/schemas/LocalizedStringArray"
          description: "Буллеты/фичи"

        cover:
          allOf:
            - $ref: "#/components/schemas/Image"
          nullable: true
        gallery:
          type: array
          items: { $ref: "#/components/schemas/Image" }
          default: []

        cardBadges:
          type: array
          items: { $ref: "#/components/schemas/Badge" }
          default: []

        nutritionTable:
          allOf:
            - $ref: "#/components/schemas/NutritionTable"
          nullable: true

        currency: { type: string, example: "EUR", default: "EUR" }
        price: { type: number, example: 2.49 }
        oldPrice: { type: number, nullable: true, example: 2.99 }
        inStock: { type: boolean, example: true }

        weightG: { type: number, nullable: true, example: 60 }
        proteinG: { type: number, nullable: true, example: 20 }

        seoTitle: { $ref: "#/components/schemas/LocalizedString" }
        seoDescription: { $ref: "#/components/schemas/LocalizedString" }

        isActive: { type: boolean, example: true }
        sort: { type: integer, example: 0 }

        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

      required: [slug, title, price]

    ProductCreate:
      type: object
      required: [slug, title, price]
      properties:
        slug: { type: string }

        title: { $ref: "#/components/schemas/LocalizedString" }
        subtitle: { $ref: "#/components/schemas/LocalizedString" }
        description: { $ref: "#/components/schemas/LocalizedString" }
        ingredients: { $ref: "#/components/schemas/LocalizedString" }
        features: { $ref: "#/components/schemas/LocalizedStringArray" }

        cover:
          allOf:
            - $ref: "#/components/schemas/Image"
          nullable: true
        gallery:
          type: array
          items: { $ref: "#/components/schemas/Image" }
          default: []

        cardBadges:
          type: array
          items: { $ref: "#/components/schemas/Badge" }
          default: []

        nutritionTable:
          allOf:
            - $ref: "#/components/schemas/NutritionTable"
          nullable: true

        currency: { type: string, default: "EUR" }
        price: { type: number }
        oldPrice: { type: number, nullable: true }
        inStock: { type: boolean, default: true }

        weightG: { type: number, nullable: true }
        proteinG: { type: number, nullable: true }

        seoTitle: { $ref: "#/components/schemas/LocalizedString" }
        seoDescription: { $ref: "#/components/schemas/LocalizedString" }

        isActive: { type: boolean, default: true }
        sort: { type: integer, default: 0 }

    ProductUpdate:
      type: object
      description: >
        Частичное обновление (PUT у тебя, но можно трактовать как patch-like).
        Передавай только те поля, которые нужно изменить.
      properties:
        slug: { type: string }

        title: { $ref: "#/components/schemas/LocalizedString" }
        subtitle: { $ref: "#/components/schemas/LocalizedString" }
        description: { $ref: "#/components/schemas/LocalizedString" }
        ingredients: { $ref: "#/components/schemas/LocalizedString" }
        features: { $ref: "#/components/schemas/LocalizedStringArray" }

        cover:
          allOf:
            - $ref: "#/components/schemas/Image"
          nullable: true
        gallery:
          type: array
          items: { $ref: "#/components/schemas/Image" }

        cardBadges:
          type: array
          items: { $ref: "#/components/schemas/Badge" }

        nutritionTable:
          allOf:
            - $ref: "#/components/schemas/NutritionTable"
          nullable: true

        currency: { type: string }
        price: { type: number }
        oldPrice: { type: number, nullable: true }
        inStock: { type: boolean }

        weightG: { type: number, nullable: true }
        proteinG: { type: number, nullable: true }

        seoTitle: { $ref: "#/components/schemas/LocalizedString" }
        seoDescription: { $ref: "#/components/schemas/LocalizedString" }

        isActive: { type: boolean }
        sort: { type: integer }

    ProductListResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Product" }
        page: { type: integer, example: 1 }
        limit: { type: integer, example: 20 }
        total: { type: integer, example: 123 }
        pages: { type: integer, example: 7 }
      required: [items, page, limit, total, pages]

    LeadSendRequest:
      type: object
      required: [name, phone]
      properties:
        name: { type: string, example: "Andrej" }
        phone: { type: string, example: "+421900000000" }
        promoCode: { type: string, example: "SALE10" }
        items:
          type: array
          nullable: true
          description: >
            Позиции лида. Необязательное поле.
            Поддерживает:
            - kind=product
            - kind=custom_box (size=5|10, сумма qty должна равняться size)
          items:
            oneOf:
              - $ref: "#/components/schemas/LeadItemProduct"
              - $ref: "#/components/schemas/LeadItemCustomBox"

    LeadItemProduct:
      type: object
      required: [kind]
      properties:
        kind: { type: string, enum: [product], example: product }
        productId:
          type: string
          description: Можно также прислать _id или id — на бэке это нормализуется
          example: "65f0aaaaaaaaaaaaaaaaaaaaaaa1"
        _id: { type: string, example: "65f0aaaaaaaaaaaaaaaaaaaaaaa1" }
        id: { type: string, example: "65f0aaaaaaaaaaaaaaaaaaaaaaa1" }
        quantity: { type: integer, minimum: 1, example: 2 }
        qty: { type: integer, minimum: 1, example: 2 }

    LeadItemCustomBox:
      type: object
      required: [kind, size, items]
      properties:
        kind: { type: string, enum: [custom_box], example: custom_box }
        size:
          type: integer
          description: Размер бокса (строго 5 или 10)
          enum: [5, 10]
          example: 10
        items:
          type: array
          minItems: 1
          description: >
            Список выбранных товаров для бокса.
            Сумма qty/quantity по всем items должна быть равна size.
          items:
            $ref: "#/components/schemas/CustomBoxItem"

    CustomBoxItem:
      type: object
      properties:
        productId: { type: string, example: "65f0aaaaaaaaaaaaaaaaaaaaaaa1" }
        _id: { type: string, example: "65f0aaaaaaaaaaaaaaaaaaaaaaa1" }
        id: { type: string, example: "65f0aaaaaaaaaaaaaaaaaaaaaaa1" }
        quantity: { type: integer, minimum: 1, example: 4 }
        qty: { type: integer, minimum: 1, example: 4 }
      oneOf:
        - required: [productId, qty]
        - required: [_id, qty]
        - required: [id, qty]
        - required: [productId, quantity]
        - required: [_id, quantity]
        - required: [id, quantity]

    Delivery:
      type: object
      properties:
        method:
          type: string
          enum: [pickup, courier, nova_poshta, other]
          default: other
        country: { type: string, default: "" }
        city: { type: string, default: "" }
        psc: { type: string, default: "" }
        address: { type: string, default: "" }
        note: { type: string, default: "" }

    Payment:
      type: object
      properties:
        method:
          type: string
          enum: [cash, card, online, bank_transfer, other]
          default: other
        status:
          type: string
          enum: [pending, paid, failed, refunded]
          default: pending
        transactionId: { type: string, default: "" }

    OrderBoxItem:
      type: object
      properties:
        id:
          allOf:
            - $ref: "#/components/schemas/ObjectId"
          description: ID товару
        barcode: { type: string, default: "" }
        title: { type: string, example: "FitWin Bar Pistachio" }
        quantity: { type: integer, minimum: 1, example: 2 }
        unitPrice: { type: number, minimum: 0, example: 2.49 }
        total: { type: number, minimum: 0, example: 4.98 }
        discountedTotal: { type: number, minimum: 0, example: 4.50 }
        img: { type: string, default: "" }
        multiplicity: { type: integer, default: 1, example: 1 }
      required: [id, title, quantity, unitPrice, total, discountedTotal]

    OrderBox:
      type: object
      properties:
        size:
          type: integer
          enum: [5, 10]
          example: 10
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderBoxItem"
          default: []
      required: [size, items]

    OrderPosition:
      type: object
      properties:
        kind:
          type: string
          enum: [product, custom_box]
          example: product
        id:
          allOf:
            - $ref: "#/components/schemas/ObjectId"
          nullable: true
        barcode: { type: string, default: "" }
        title: { type: string, example: "FitWin Bar Pistachio" }
        quantity: { type: integer, minimum: 1, example: 2 }
        unitPrice: { type: number, minimum: 0, example: 2.49 }
        total: { type: number, minimum: 0, example: 4.98 }
        discountedTotal: { type: number, minimum: 0, example: 4.50 }
        img: { type: string, default: "" }
        multiplicity: { type: integer, default: 1, example: 1 }
        box:
          allOf:
            - $ref: "#/components/schemas/OrderBox"
          nullable: true
      required: [kind, title, quantity, unitPrice, total, discountedTotal]

    OrderTotals:
      type: object
      properties:
        subtotal: { type: number, minimum: 0, example: 29.9 }
        discountTotal: { type: number, minimum: 0, example: 3.5 }
        total: { type: number, minimum: 0, example: 26.4 }
        currency: { type: string, default: "EUR", example: "EUR" }

    OrderCustomer:
      type: object
      properties:
        name: { type: string, example: "Andrej" }
        surname: { type: string, example: "Novak" }
        phone: { type: string, example: "+421900000000" }
        email: { type: string, example: "andrej@example.com", default: "" }
      required: [name, phone]

    Order:
      type: object
      properties:
        _id: { $ref: "#/components/schemas/ObjectId" }
        orderNumber: { type: string, example: "ORD-12345678-4567" }
        customer:
          $ref: "#/components/schemas/OrderCustomer"
        promoCode: { type: string, example: "SALE10", default: "" }
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderPosition"
          default: []
        totals:
          $ref: "#/components/schemas/OrderTotals"
        delivery:
          $ref: "#/components/schemas/Delivery"
        payment:
          $ref: "#/components/schemas/Payment"
        status:
          type: string
          enum: [new, processing, confirmed, shipped, completed, cancelled]
          default: new
        comment: { type: string, default: "" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [orderNumber, customer, items, totals, status]

    OrderCreateRequest:
      type: object
      required: [name, phone, items]
      properties:
        name: { type: string, example: "Andrej" }
        surname: { type: string, example: "Novak" }
        phone: { type: string, example: "+421900000000" }
        email: { type: string, example: "andrej@example.com", default: "" }
        promoCode: { type: string, example: "SALE10", default: "" }
        items:
          type: array
          minItems: 1
          items:
            oneOf:
              - $ref: "#/components/schemas/LeadItemProduct"
              - $ref: "#/components/schemas/LeadItemCustomBox"
        delivery:
          $ref: "#/components/schemas/Delivery"
        payment:
          $ref: "#/components/schemas/Payment"
        comment: { type: string, default: "" }
        status:
          type: string
          enum: [new, processing, confirmed, shipped, completed, cancelled]
          default: new

    OrderUpdateRequest:
      type: object
      properties:
        name: { type: string, example: "Andrej" }
        surname: { type: string, example: "Novak" }
        phone: { type: string, example: "+421900000000" }
        email: { type: string, example: "andrej@example.com" }
        promoCode: { type: string, example: "SALE10" }
        items:
          type: array
          minItems: 1
          description: >
            Якщо передати items, вони повністю замінять поточні позиції замовлення.
          items:
            oneOf:
              - $ref: "#/components/schemas/LeadItemProduct"
              - $ref: "#/components/schemas/LeadItemCustomBox"
        delivery:
          $ref: "#/components/schemas/Delivery"
        payment:
          $ref: "#/components/schemas/Payment"
        comment: { type: string }
        status:
          type: string
          enum: [new, processing, confirmed, shipped, completed, cancelled]

    OrderStatusPatchRequest:
      type: object
      properties:
        status:
          type: string
          enum: [new, processing, confirmed, shipped, completed, cancelled]
        paymentStatus:
          type: string
          enum: [pending, paid, failed, refunded]

    OrderListResponse:
      type: object
      properties:
        ok: { type: boolean, example: true }
        data:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        pagination:
          type: object
          properties:
            page: { type: integer, example: 1 }
            limit: { type: integer, example: 20 }
            total: { type: integer, example: 125 }
            pages: { type: integer, example: 7 }
