openapi: 3.0.3
info:
  title: FitWin Shop API
  version: 1.1.0
  description: |
    API інтернет-магазину з підтримкою:
    - звичайних товарів
    - покупки товару поштучно або боксом
    - кастомних боксів
    - створення замовлень
    - запуску оплати Comgate
    - callback'ів від Comgate

servers:
  - url: http://localhost:5000/api
    description: Local
  - url: https://example.com/api
    description: Production

tags:
  - name: Products
  - name: Orders
  - name: Payments

paths:
  /products:
    get:
      tags: [Products]
      summary: Отримати список товарів
      description: Повертає список товарів з можливими варіантами покупки `unit/box`.
      responses:
        "200":
          description: Успішно
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"

  /products/{id}:
    get:
      tags: [Products]
      summary: Отримати товар по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Успішно
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductSingleResponse"
        "404":
          description: Товар не знайдено

  /orders:
    post:
      tags: [Orders]
      summary: Створити замовлення
      description: |
        Створює замовлення.

        Підтримує позиції:
        - `kind: product`
        - `kind: custom_box`

        Для `product` можна передати:
        - `purchaseMode: unit`
        - `purchaseMode: box`

        Якщо `purchaseMode = box`, то:
        - `quantity` = кількість боксів
        - ціна береться з `product.purchaseOptions.box.price`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
            examples:
              unit_order:
                summary: Замовлення з поштучним товаром
                value:
                  name: "Anna"
                  surname: "Kovacs"
                  phone: "+421900111222"
                  email: "anna@example.com"
                  promoCode: ""
                  comment: "Будь ласка, зателефонуйте перед доставкою"
                  delivery:
                    country: "Slovakia"
                    city: "Bratislava"
                    address: "Main street 12"
                    psc: "81101"
                    note: ""
                  payment:
                    method: "online"
                  items:
                    - kind: "product"
                      id: "65f0c0c7c4a1111111111111"
                      quantity: 3
                      purchaseMode: "unit"

              box_order:
                summary: Замовлення товару боксом
                value:
                  name: "Martin"
                  surname: "Novak"
                  phone: "+421900555444"
                  email: "martin@example.com"
                  promoCode: "FIT10"
                  comment: ""
                  delivery:
                    country: "Slovakia"
                    city: "Kosice"
                    address: "Hlavna 8"
                    psc: "04001"
                    note: ""
                  payment:
                    method: "online"
                  items:
                    - kind: "product"
                      id: "65f0c0c7c4a1222222222222"
                      quantity: 2
                      purchaseMode: "box"

              mixed_order:
                summary: Змішане замовлення unit + box + custom_box
                value:
                  name: "Petra"
                  surname: "Svitkova"
                  phone: "+421901222333"
                  email: "petra@example.com"
                  promoCode: ""
                  comment: "Доставка після 18:00"
                  delivery:
                    country: "Slovakia"
                    city: "Zilina"
                    address: "Green 5"
                    psc: "01001"
                    note: "Ring the bell"
                  payment:
                    method: "online"
                  items:
                    - kind: "product"
                      id: "65f0c0c7c4a1333333333333"
                      quantity: 2
                      purchaseMode: "unit"
                    - kind: "product"
                      id: "65f0c0c7c4a1444444444444"
                      quantity: 1
                      purchaseMode: "box"
                    - kind: "custom_box"
                      size: 5
                      items:
                        - id: "65f0c0c7c4a1555555555555"
                          quantity: 2
                        - id: "65f0c0c7c4a1666666666666"
                          quantity: 3
      responses:
        "201":
          description: Замовлення створено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOrderResponse"
        "400":
          description: Помилка валідації
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      tags: [Orders]
      summary: Отримати список замовлень
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
            enum: [new, processing, confirmed, shipped, completed, cancelled]
        - name: phone
          in: query
          schema:
            type: string
        - name: q
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            example: "-createdAt"
      responses:
        "200":
          description: Успішно
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"

  /orders/{id}:
    get:
      tags: [Orders]
      summary: Отримати замовлення по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Успішно
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderSingleResponse"
        "404":
          description: Замовлення не знайдено

    put:
      tags: [Orders]
      summary: Оновити замовлення
      description: |
        Якщо передані `items`, позиції замовлення будуть перераховані заново.

        Для `product` підтримується:
        - `purchaseMode: unit`
        - `purchaseMode: box`
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderRequest"
            examples:
              update_order:
                value:
                  status: "processing"
                  comment: "Оновлений коментар"
                  items:
                    - kind: "product"
                      id: "65f0c0c7c4a1111111111111"
                      quantity: 1
                      purchaseMode: "box"
      responses:
        "200":
          description: Замовлення оновлено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderSingleResponse"
        "400":
          description: Помилка валідації
        "404":
          description: Замовлення не знайдено

    delete:
      tags: [Orders]
      summary: Видалити замовлення
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Замовлення видалено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteOrderResponse"
        "404":
          description: Замовлення не знайдено

  /orders/{id}/status:
    patch:
      tags: [Orders]
      summary: Оновити статус замовлення
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [new, processing, confirmed, shipped, completed, cancelled]
                paymentStatus:
                  type: string
                  enum: [pending, paid, failed, refunded, cancelled]
      responses:
        "200":
          description: Статус оновлено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderSingleResponse"
        "404":
          description: Замовлення не знайдено

  /orders/{id}/payment:
    post:
      tags: [Payments]
      summary: Створити оплату Comgate для існуючого замовлення
      description: |
        Створює платіжну сесію Comgate для вже створеного замовлення.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Платіж успішно створено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOrderPaymentResponse"
        "400":
          description: Неможливо створити оплату
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Замовлення не знайдено

  /payments/comgate/callback:
    post:
      tags: [Payments]
      summary: Callback від Comgate
      description: |
        Endpoint для callback'ів Comgate.

        Очікувані status:
        - PAID
        - CANCELLED
        - AUTHORIZED
        - PENDING
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComgateCallbackRequest"
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                type: string
                example: OK
        "400":
          description: Відсутні обов'язкові поля
        "404":
          description: Замовлення не знайдено
        "500":
          description: Помилка обробки callback

components:
  schemas:
    LocalizedString:
      type: object
      properties:
        ua:
          type: string
          default: ""
        ru:
          type: string
          default: ""
        en:
          type: string
          default: ""
        sk:
          type: string
          default: ""

    ProductImage:
      type: object
      properties:
        url:
          type: string
          format: uri
        alt:
          $ref: "#/components/schemas/LocalizedString"
        sort:
          type: number
          default: 0

    PurchaseOptionUnit:
      type: object
      properties:
        enabled:
          type: boolean
          example: true
        price:
          type: number
          format: float
          nullable: true
          example: 2.5

    PurchaseOptionBox:
      type: object
      properties:
        enabled:
          type: boolean
          example: true
        price:
          type: number
          format: float
          nullable: true
          example: 30
        quantity:
          type: integer
          nullable: true
          example: 12

    PurchaseOptions:
      type: object
      properties:
        unit:
          $ref: "#/components/schemas/PurchaseOptionUnit"
        box:
          $ref: "#/components/schemas/PurchaseOptionBox"
        defaultMode:
          type: string
          enum: [unit, box]
          example: unit

    Badge:
      type: object
      properties:
        key:
          type: string
        label:
          $ref: "#/components/schemas/LocalizedString"
        valueNumber:
          type: number
          nullable: true
        valueText:
          type: string
        unit:
          type: string
        display:
          type: string
          enum: [value, label_value]
        sort:
          type: integer
        isHighlighted:
          type: boolean

    NutritionCell:
      type: object
      properties:
        value:
          type: number
          nullable: true
        text:
          type: string
        unit:
          type: string

    NutritionColumn:
      type: object
      properties:
        key:
          type: string
        label:
          $ref: "#/components/schemas/LocalizedString"
        meta:
          type: object
          properties:
            grams:
              type: number
              nullable: true
        sort:
          type: integer

    NutritionRow:
      type: object
      properties:
        key:
          type: string
        label:
          $ref: "#/components/schemas/LocalizedString"
        values:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/NutritionCell"
        sort:
          type: integer

    NutritionTable:
      type: object
      properties:
        title:
          $ref: "#/components/schemas/LocalizedString"
        columns:
          type: array
          items:
            $ref: "#/components/schemas/NutritionColumn"
        rows:
          type: array
          items:
            $ref: "#/components/schemas/NutritionRow"

    Product:
      type: object
      properties:
        _id:
          type: string
        slug:
          type: string
        title:
          $ref: "#/components/schemas/LocalizedString"
        subtitle:
          $ref: "#/components/schemas/LocalizedString"
        description:
          $ref: "#/components/schemas/LocalizedString"
        ingredients:
          $ref: "#/components/schemas/LocalizedString"
        features:
          type: object
          properties:
            ua:
              type: array
              items: { type: string }
            ru:
              type: array
              items: { type: string }
            en:
              type: array
              items: { type: string }
            sk:
              type: array
              items: { type: string }
        cover:
          oneOf:
            - $ref: "#/components/schemas/ProductImage"
            - type: string
              format: uri
        gallery:
          type: array
          items:
            oneOf:
              - type: string
                format: uri
              - $ref: "#/components/schemas/ProductImage"
        cardBadges:
          type: array
          items:
            $ref: "#/components/schemas/Badge"
        nutritionTable:
          $ref: "#/components/schemas/NutritionTable"
        currency:
          type: string
          example: EUR
        price:
          type: number
          format: float
          example: 2.5
        oldPrice:
          type: number
          format: float
          nullable: true
        inStock:
          type: boolean
        purchaseOptions:
          $ref: "#/components/schemas/PurchaseOptions"
        weightG:
          type: number
          nullable: true
        proteinG:
          type: number
          nullable: true
        seoTitle:
          $ref: "#/components/schemas/LocalizedString"
        seoDescription:
          $ref: "#/components/schemas/LocalizedString"
        isActive:
          type: boolean
        sort:
          type: integer
        isBar:
          type: boolean
        brand:
          type: object
          properties:
            title:
              $ref: "#/components/schemas/LocalizedString"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Delivery:
      type: object
      properties:
        country:
          type: string
          example: Slovakia
        city:
          type: string
          example: Bratislava
        address:
          type: string
          example: Main street 12
        psc:
          type: string
          example: "81101"
        note:
          type: string
          example: ""

    Payment:
      type: object
      properties:
        provider:
          type: string
          example: comgate
        method:
          type: string
          enum: [cash, card, online, bank_transfer, other]
        status:
          type: string
          enum: [pending, paid, failed, refunded, cancelled]
        transactionId:
          type: string
        refId:
          type: string
        redirectUrl:
          type: string
          format: uri
        amount:
          type: number
          format: float
        currency:
          type: string
          example: EUR
        paidAt:
          type: string
          format: date-time
          nullable: true
        rawCallback:
          nullable: true

    OrderBoxItem:
      type: object
      properties:
        id:
          type: string
        barcode:
          type: string
        title:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
          format: float
        total:
          type: number
          format: float
        discountedTotal:
          type: number
          format: float
        img:
          type: string
        multiplicity:
          type: number
      required:
        - id
        - title
        - quantity
        - unitPrice
        - total
        - discountedTotal

    OrderBox:
      type: object
      properties:
        size:
          type: integer
          enum: [5, 10]
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderBoxItem"
      required:
        - size
        - items

    OrderPosition:
      type: object
      properties:
        kind:
          type: string
          enum: [product, custom_box]
        id:
          type: string
          nullable: true
        barcode:
          type: string
        title:
          type: string
        quantity:
          type: integer
          minimum: 1
        unitPrice:
          type: number
          format: float
        total:
          type: number
          format: float
        discountedTotal:
          type: number
          format: float
        img:
          type: string
        multiplicity:
          type: number
        purchaseMode:
          type: string
          enum: [unit, box]
          default: unit
          description: |
            Для `kind=product`:
            - `unit` = покупка поштучно
            - `box` = покупка боксом

            Для `kind=custom_box` значення зберігається як `unit`.
        packQuantity:
          type: integer
          nullable: true
          description: |
            Кількість штук у боксі на момент покупки.
            Має значення тільки якщо `purchaseMode=box`.
            Для `unit` = null.
        box:
          allOf:
            - $ref: "#/components/schemas/OrderBox"
          nullable: true
      required:
        - kind
        - title
        - quantity
        - unitPrice
        - total
        - discountedTotal

    Totals:
      type: object
      properties:
        subtotal:
          type: number
          format: float
        discountTotal:
          type: number
          format: float
        total:
          type: number
          format: float
        currency:
          type: string
          example: EUR

    Customer:
      type: object
      properties:
        name:
          type: string
        surname:
          type: string
        phone:
          type: string
        email:
          type: string
      required:
        - name
        - phone

    Order:
      type: object
      properties:
        _id:
          type: string
        orderNumber:
          type: string
          example: ORD-12345678-1234
        customer:
          $ref: "#/components/schemas/Customer"
        promoCode:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderPosition"
        totals:
          $ref: "#/components/schemas/Totals"
        delivery:
          $ref: "#/components/schemas/Delivery"
        payment:
          $ref: "#/components/schemas/Payment"
        status:
          type: string
          enum: [new, processing, confirmed, shipped, completed, cancelled]
        comment:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    LeadItemProduct:
      type: object
      properties:
        kind:
          type: string
          enum: [product]
        id:
          type: string
          description: ID товару
        quantity:
          type: integer
          minimum: 1
          description: |
            Якщо `purchaseMode=unit` — кількість штук.
            Якщо `purchaseMode=box` — кількість боксів.
        purchaseMode:
          type: string
          enum: [unit, box]
          default: unit
      required:
        - kind
        - id
        - quantity

    LeadItemCustomBoxProduct:
      type: object
      properties:
        id:
          type: string
        quantity:
          type: integer
          minimum: 1
      required:
        - id
        - quantity

    LeadItemCustomBox:
      type: object
      properties:
        kind:
          type: string
          enum: [custom_box]
        size:
          type: integer
          enum: [5, 10]
        items:
          type: array
          items:
            $ref: "#/components/schemas/LeadItemCustomBoxProduct"
      required:
        - kind
        - size
        - items

    CreateOrderRequest:
      type: object
      properties:
        name:
          type: string
        surname:
          type: string
        phone:
          type: string
        email:
          type: string
        promoCode:
          type: string
        items:
          type: array
          items:
            oneOf:
              - $ref: "#/components/schemas/LeadItemProduct"
              - $ref: "#/components/schemas/LeadItemCustomBox"
        delivery:
          $ref: "#/components/schemas/Delivery"
        payment:
          type: object
          properties:
            method:
              type: string
              enum: [cash, card, online, bank_transfer, other]
              default: online
        comment:
          type: string
        status:
          type: string
          enum: [new, processing, confirmed, shipped, completed, cancelled]
          default: new
      required:
        - name
        - phone
        - items

    UpdateOrderRequest:
      type: object
      properties:
        name:
          type: string
        surname:
          type: string
        phone:
          type: string
        email:
          type: string
        promoCode:
          type: string
        items:
          type: array
          items:
            oneOf:
              - $ref: "#/components/schemas/LeadItemProduct"
              - $ref: "#/components/schemas/LeadItemCustomBox"
        delivery:
          $ref: "#/components/schemas/Delivery"
        payment:
          type: object
          properties:
            provider:
              type: string
            method:
              type: string
              enum: [cash, card, online, bank_transfer, other]
            status:
              type: string
              enum: [pending, paid, failed, refunded, cancelled]
            transactionId:
              type: string
            refId:
              type: string
            redirectUrl:
              type: string
            amount:
              type: number
            currency:
              type: string
            paidAt:
              type: string
              format: date-time
              nullable: true
            rawCallback:
              nullable: true
        comment:
          type: string
        status:
          type: string
          enum: [new, processing, confirmed, shipped, completed, cancelled]

    CreateOrderResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        order:
          $ref: "#/components/schemas/Order"

    CreateOrderPaymentResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        data:
          type: object
          properties:
            orderId:
              type: string
            orderNumber:
              type: string
            transactionId:
              type: string
            redirectUrl:
              type: string
              format: uri
            paymentStatus:
              type: string
              enum: [pending, paid, failed, refunded, cancelled]

    OrderSingleResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        data:
          $ref: "#/components/schemas/Order"

    OrderListResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        pagination:
          type: object
          properties:
            page:
              type: integer
            limit:
              type: integer
            total:
              type: integer
            pages:
              type: integer

    ProductSingleResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        data:
          $ref: "#/components/schemas/Product"

    ProductListResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/Product"

    DeleteOrderResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        message:
          type: string
          example: Замовлення видалено

    ComgateCallbackRequest:
      type: object
      properties:
        transId:
          type: string
          example: "ABC123456"
        refId:
          type: string
          example: "65f0c0c7c4a1111111111111"
        status:
          type: string
          example: "PAID"
        curr:
          type: string
          example: "EUR"
        price:
          type: number
          example: 3000
      required:
        - transId
        - refId
        - status

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
